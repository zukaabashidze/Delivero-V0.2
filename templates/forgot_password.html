{% extends 'base.html' %}
{% block content %}

<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        background: rgba(10, 10, 10, 0.85) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 215, 0, 0.15) !important;
        border-radius: 30px !important;
        padding: 50px 40px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        max-width: 400px;
        width: 100%;
    }

    .icon-box {
        width: 70px;
        height: 70px;
        background: rgba(255, 215, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
        color: #ffd700;
        font-size: 1.8rem;
        border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .auth-title {
        color: #fff;
        font-weight: 900;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 1.5rem;
        margin-bottom: 10px;
    }

    /* ინპუტების სტილი */
    .auth-input-group {
        position: relative;
        margin-bottom: 20px;
    }

    .auth-input-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #ffd700;
        opacity: 0.7;
    }

    .auth-control {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 215, 0, 0.1) !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 14px 15px 14px 45px !important;
        font-size: 0.95rem;
        transition: all 0.3s ease !important;
    }

    .auth-control:focus {
        border-color: #ffd700 !important;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.1) !important;
    }

    /* ღილაკი */
    .btn-auth {
        background: linear-gradient(45deg, #d4af37, #ffd700) !important;
        color: #000 !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        border-radius: 12px !important;
        padding: 15px !important;
        letter-spacing: 2px;
        border: none !important;
        transition: 0.3s !important;
        margin-top: 10px;
    }

    .btn-auth:hover {
        background: #fff !important;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3) !important;
    }

    .back-link {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.85rem;
        transition: 0.3s;
        display: inline-block;
        margin-top: 25px;
    }

    .back-link:hover {
        color: #ffd700;
    }
</style>

<div class="auth-container">
    <div class="auth-card text-center">
        <!-- ვიზუალური იკონი -->
        <div class="icon-box">
            <i class="fas fa-key"></i>
        </div>

        <h1 class="auth-title">პაროლის აღდგენა</h1>
        <p class="text-white-50 small mb-4">მიუთითეთ მონაცემები და ადმინისტრაცია დაგიკავშირდებათ Gmail-ზე.</p>

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <!-- იუზერნეიმი -->
            <div class="auth-input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="form-control auth-control" placeholder="მომხმარებლის სახელი" required>
            </div>

            <!-- Gmail -->
            <div class="auth-input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" class="form-control auth-control" placeholder="თქვენი Gmail" required>
            </div>

            <button type="submit" class="btn btn-auth w-100">მოთხოვნის გაგზავნა</button>
        </form>

        <a href="{{ url_for('login') }}" class="back-link">
            <i class="fas fa-arrow-left me-2"></i> უკან დაბრუნება
        </a>
    </div>
</div>

{% endblock %}
