{% extends 'base.html' %}
{% block content %}

<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        background: rgba(10, 10, 10, 0.9) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 215, 0, 0.2) !important;
        border-radius: 30px !important;
        padding: 50px 40px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        max-width: 400px;
        width: 100%;
    }

    .auth-control {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 215, 0, 0.2) !important;
        color: #ffffff !important;
        border-radius: 12px !important;
        padding: 14px 15px 14px 45px !important;
        font-size: 1rem !important;
        transition: all 0.3s ease !important;
    }

    .auth-control::placeholder {
        color: rgba(255, 255, 255, 0.5) !important;
    }


    .icon-box { width: 70px; height: 70px; background: rgba(255, 215, 0, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; color: #ffd700; font-size: 1.8rem; border: 1px solid rgba(255, 215, 0, 0.2); }
    .auth-title { color: #fff; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; font-size: 1.5rem; margin-bottom: 10px; }
    .auth-input-group { position: relative; margin-bottom: 20px; }
    .auth-input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #ffd700; z-index: 10; }
    .btn-auth { background: #ffd700 !important; color: #000 !important; font-weight: 800 !important; border-radius: 12px !important; padding: 15px !important; border: none !important; transition: 0.3s !important; width: 100%; }
    .back-link { color: rgba(255, 255, 255, 0.5); text-decoration: none; display: inline-block; margin-top: 25px; }
</style>

<div class="auth-container">
    <div class="auth-card text-center">
        <div class="icon-box"><i class="fas fa-key"></i></div>
        <h1 class="auth-title">პაროლის აღდგენა</h1>
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="auth-input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="form-control auth-control" placeholder="მომხმარებლის სახელი" required>
            </div>
            <div class="auth-input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" class="form-control auth-control" placeholder="თქვენი Gmail" required>
            </div>
            <button type="submit" class="btn btn-auth">მოთხოვნის გაგზავნა</button>
        </form>
        <a href="{{ url_for('login') }}" class="back-link"><i class="fas fa-arrow-left me-2"></i> უკან დაბრუნება</a>
    </div>
</div>
{% endblock %}
