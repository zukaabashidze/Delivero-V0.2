{% extends 'base.html' %}
{% block content %}

<style>
    .contact-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
    }

    .glass-card {
        background: rgba(18, 18, 18, 0.8) !important;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 215, 0, 0.15) !important;
        border-radius: 30px !important;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5) !important;
        overflow: hidden;
    }

    .accent-text {
        color: #ffd700;
        font-weight: 800;
        letter-spacing: -1px;
        text-transform: uppercase;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 215, 0, 0.1) !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 15px 20px !important;
        transition: all 0.3s ease !important;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: #ffd700 !important;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.1) !important;
        outline: none;
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.9rem;
    }

    .btn-premium {
        background: linear-gradient(45deg, #d4af37, #ffd700) !important;
        color: #000 !important;
        border: none !important;
        border-radius: 12px !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s ease !important;
        position: relative;
        z-index: 1;
    }

    .btn-premium:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4) !important;
        background: #fff !important; /* მაუსის მიტანისას ხდება თეთრი */
    }

    .contact-info-icon {
        width: 50px;
        height: 50px;
        background: rgba(255, 215, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffd700;
        margin-bottom: 15px;
        font-size: 1.2rem;
    }
</style>

<div class="contact-container py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="display-4 accent-text">Contact Us</h2>
            <p class="text-white-50 mx-auto" style="max-width: 500px;">გაქვთ კითხვები? მოგვწერეთ და ჩვენი გუნდი უმოკლეს დროში დაგიკავშირდებათ.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="glass-card p-4 p-md-5">
                    <form method="POST">
                        <div class="row g-4">
 
                            <div class="col-md-6">
                                <label class="text-white-50 small mb-2 ms-1 text-uppercase fw-bold" style="letter-spacing: 1px;">თქვენი სახელი</label>
                                <input type="text" name="name" class="form-control" placeholder="მაგ: გიორგი" required>
                            </div>
                            
                      
                            <div class="col-md-6">
                                <label class="text-white-50 small mb-2 ms-1 text-uppercase fw-bold" style="letter-spacing: 1px;">Gmail</label>
                                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
                            </div>

                      
                            <div class="col-12">
                                <label class="text-white-50 small mb-2 ms-1 text-uppercase fw-bold" style="letter-spacing: 1px;">საკითხი</label>
                                <input type="text" name="subject" class="form-control" placeholder="თანამშრომლობა, საჩივარი, სხვა..." required>
                            </div>

              
                            <div class="col-12">
                                <label class="text-white-50 small mb-2 ms-1 text-uppercase fw-bold" style="letter-spacing: 1px;">შეტყობინება</label>
                                <textarea name="message" class="form-control" rows="5" placeholder="დაწერეთ დეტალურად..." required></textarea>
                            </div>

             
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-premium w-100 py-3">
                                    <i class="fas fa-paper-plane me-2"></i> შეტყობინების გაგზავნა
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="row mt-5 text-center g-4">
                    <div class="col-md-4">
                        <div class="d-flex flex-column align-items-center">
                            <div class="contact-info-icon"><i class="fas fa-envelope"></i></div>
                            <span class="text-white-50 small text-uppercase">მოგვწერეთ</span>
                            <p class="text-white fw-bold">supportdelivero@gmail.com</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="d-flex flex-column align-items-center">
                            <div class="contact-info-icon"><i class="fas fa-phone-alt"></i></div>
                            <span class="text-white-50 small text-uppercase">დაგვირეკეთ</span>
                            <p class="text-white fw-bold">+995 558 60 02 07</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="d-flex flex-column align-items-center">
                            <div class="contact-info-icon"><i class="fas fa-map-marker-alt"></i></div>
                            <span class="text-white-50 small text-uppercase">ლოკაცია</span>
                            <p class="text-white fw-bold">Tbilisi, Georgia</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
