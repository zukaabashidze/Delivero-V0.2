{% extends 'base.html' %}
{% block content %}

<style>
    body { background-color: #050505; color: #fff; }
    .hero-premium {
        height: 80vh;
        background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                    url('https://images.unsplash.com/photo-1580674285054-bed31e145f59?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }
    .accent-gold {
        background: linear-gradient(135deg, #d4af37 0%, #f1e0a9 50%, #d4af37 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        text-transform: uppercase;
    }
    .glass-search {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 50px;
        padding: 10px;
        display: flex;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        box-shadow: 0 0 30px rgba(214, 175, 55, 0.15);
    }
    .btn-gold {
        background: #d4af37;
        color: #000;
        border-radius: 40px;
        padding: 12px 35px;
        font-weight: 700;
        transition: 0.4s;
    }
    .feature-card {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 40px;
        border-radius: 30px;
        transition: 0.4s;
        height: 100%;
    }
</style>

<section class="hero-premium text-center py-5">
    <div class="container">
        <h1 class="display-1 accent-gold mb-3">Delivero</h1>
        <p class="lead mb-5" style="letter-spacing: 5px; font-weight: 300; color: rgba(255,255,255,0.8);">SPEED. PRIVACY. PERFECTION.</p>
        
        <form action="{{ url_for('track') }}" method="POST" class="glass-search d-flex mx-auto">
            <input type="number" name="order_id" class="form-control" style="background: transparent; border: none; color: white; padding-left: 25px;" placeholder="შეიყვანეთ შეკვეთის ID" required>
            <button type="submit" class="btn btn-gold px-4">TRACK</button>
        </form>
    </div>
</section>

<section class="py-5 mt-5">
    <div class="container text-center">
        <h2 class="accent-gold mb-5">რატომ ჩვენ?</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="feature-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/2951/2951136.png" width="60" class="mb-4" style="filter: invert(1);">
                    <h4>ელვისებური სისწრაფე</h4>
                    <p class="text-white-50">ჩაბარება შეკვეთის აღებიდან იმავე დღეს.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <img src="https://cdn-icons-png.flaticon.com/128/2438/2438078.png" width="60" class="mb-4" style="filter: invert(1);">
                    <h4>სრული დაცვა</h4>
                    <p class="text-white-50">თქვენი მონაცემები და ნივთი დაცულია.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/3141/3141133.png" width="60" class="mb-4" style="filter: invert(1);">
                    <h4>24/7 მხარდაჭერა</h4>
                    <p class="text-white-50">ჩვენი გუნდი მუდმივად თქვენს სამსახურშია.</p>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
