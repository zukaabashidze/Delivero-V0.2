{% extends 'base.html' %}
{% block content %}

<style>
    .auth-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: rgba(10, 10, 10, 0.9) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255, 215, 0, 0.2) !important; border-radius: 30px !important; padding: 50px 40px; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8); max-width: 420px; width: 100%; }
    .auth-title { color: #fff; font-weight: 900; text-transform: uppercase; font-size: 1.8rem; text-align: center; margin-bottom: 20px; }
    
    .auth-control {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 215, 0, 0.2) !important;
        color: #ffffff !important; 
        border-radius: 12px !important;
        padding: 14px 45px !important;
        transition: 0.3s !important;
    }

    .auth-control::placeholder {
        color: rgba(255, 255, 255, 0.5) !important;
    }

    .auth-input-group { position: relative; margin-bottom: 20px; }
    .auth-input-group i.input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #ffd700; z-index: 10; }
    .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #ffd700; z-index: 10; }
    .btn-auth { background: #ffd700 !important; color: #000 !important; font-weight: 800 !important; border-radius: 12px !important; padding: 15px !important; border: none !important; width: 100%; }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">CREATE <span style="color: #ffd700;">ACCOUNT</span></h1>
        <form method="POST">
            <div class="auth-input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-control auth-control" placeholder="მომხმარებლის სახელი" required>
            </div>
            <div class="auth-input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" name="password" class="form-control auth-control" placeholder="პაროლი" required>
                <span class="password-toggle" onclick="togglePassword()">
                    <i id="toggleIcon" class="fas fa-eye"></i>
                </span>
            </div>
            <button type="submit" class="btn btn-auth">რეგისტრაცია</button>
        </form>
        <div class="text-center mt-4">
            <p class="small text-white-50">უკვე გაქვს პროფილი? <a href="/login" style="color: #ffd700; text-decoration: none; font-weight: 600;">შესვლა</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passInput = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");
    if (passInput.type === "password") {
        passInput.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        passInput.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>
{% endblock %}
