{% extends 'base.html' %}
{% block content %}

<style>
    /* ავტორიზაციის ბარათის სტილი */
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        background: rgba(10, 10, 10, 0.85) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 215, 0, 0.15) !important;
        border-radius: 30px !important;
        padding: 50px 40px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.05);
        max-width: 400px;
        width: 100%;
        transition: all 0.4s ease;
    }

    .auth-card:hover {
        border-color: rgba(255, 215, 0, 0.4) !important;
        box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
    }

    .auth-title {
        color: #fff;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 1.8rem;
        margin-bottom: 5px;
    }

    .auth-subtitle {
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.85rem;
        margin-bottom: 35px;
    }

    /* ინპუტების სტილი */
    .auth-input-group {
        position: relative;
        margin-bottom: 25px;
    }

    .auth-input-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #ffd700;
        font-size: 0.9rem;
        opacity: 0.7;
    }

    .auth-control {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 215, 0, 0.1) !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 14px 15px 14px 45px !important; /* ადგილი იკონისთვის */
        font-size: 0.95rem;
        transition: all 0.3s ease !important;
    }

    .auth-control:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: #ffd700 !important;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.2) !important;
        outline: none;
    }

    /* ღილაკი */
    .btn-auth {
        background: #ffd700 !important;
        color: #000 !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        border-radius: 12px !important;
        padding: 14px !important;
        letter-spacing: 2px;
        border: none !important;
        transition: all 0.3s ease !important;
        margin-top: 10px;
    }

    .btn-auth:hover {
        background: #fff !important;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3) !important;
    }

    .auth-footer {
        margin-top: 30px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 20px;
    }

    .accent-link {
        color: #ffd700;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .accent-link:hover {
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
</style>

<div class="login-container">
    <div class="auth-card text-center">
        <div class="mb-4">
            <!-- აქ შეგიძლია ლოგოც ჩასვა -->
            <h1 class="auth-title">WELCOME</h1>
            <p class="auth-subtitle">ავტორიზაცია Delivero-ს პანელში</p>
        </div>

        <form method="POST">
            <!-- იუზერნეიმი -->
            <div class="auth-input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="form-control auth-control" placeholder="მომხმარებელი" required>
            </div>

            <!-- პაროლი -->
            <div class="auth-input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control auth-control" placeholder="პაროლი" required>
            </div>

            <button type="submit" class="btn btn-auth w-100">შესვლა</button>
        </form>

        <div class="auth-footer">
            <p class="small text-white-50 mb-2">
                არ გაქვს პროფილი? <a href="/register" class="accent-link">შექმენი</a>
            </p>
            <a href="{{ url_for('forgot_password') }}" class="small text-white-50 opacity-50" style="text-decoration: none; font-size: 0.75rem;">
                დაგავიწყდა პაროლი?
            </a>
        </div>
    </div>
</div>

{% endblock %}
