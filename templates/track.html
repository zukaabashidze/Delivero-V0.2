{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        min-height: 100vh;
    }

    .premium-card {
        background: rgba(20, 20, 20, 0.8) !important;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 215, 0, 0.2) !important;
        border-radius: 24px !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5) !important;
    }

    .tracking-input-light {
        background: rgba(255, 255, 255, 0.9) !important; 
        border: 2px solid #ffd700 !important;
        color: #000 !important; 
        border-radius: 12px !important;
        padding: 15px !important;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .tracking-input-light:focus {
        background: #ffffff !important; 
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4) !important;
        transform: scale(1.02);
    }

    .btn-delivero-bright {
        background: #ffd700 !important;
        color: #000 !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        border-radius: 12px !important;
        padding: 14px !important;
        border: 2px solid #ffd700 !important;
        transition: all 0.3s ease;
    }

    .btn-delivero-bright:hover {
        background: #000 !important;
        color: #ffd700 !important;
        border-color: #ffd700 !important;
    }

    .status-box {
        background: rgba(255, 215, 0, 0.05);
        border-left: 4px solid #ffd700;
        border-radius: 8px;
    }

    .detail-label {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 2px;
    }

    .detail-value {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 500;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .animated-result {
        animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="premium-card p-4 p-lg-5">
                <div class="text-center mb-4">
                    <h2 style="color: #ffd700; font-weight: 800; letter-spacing: -1px;">TRACKING</h2>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">შეიყვანეთ კოდი თქვენი ამანათის საპოვნელად</p>
                </div>

                <form method="POST" class="mb-2 p-3" style="background: rgba(255,255,255,0.05); border-radius: 20px;">
                    <div class="mb-3">
                        <input type="text" name="order_id" class="form-control tracking-input-light text-center" 
                               placeholder="შეიყვანეთ ID (მაგ: 105)" 
                               value="{{ request.form.get('order_id', '') }}" required>
                    </div>
                    <button type="submit" class="btn btn-delivero-bright w-100">ამანათის ძებნა</button>
                </form>

   
                {% if order %}
                <div class="mt-5 animated-result">
                    <div class="status-box p-3 mb-4">
                        <div class="detail-label">ამჟამინდელი სტატუსი</div>
                        <div class="detail-value" style="color: #ffd700;">● {{ order.status }}</div>
                    </div>

                    <div class="row g-4">
                        <div class="col-6">
                            <div class="detail-label">ნივთი</div>
                            <div class="detail-value">{{ order.item_name }}</div>
                        </div>
                        <div class="col-6 text-end">
                            <div class="detail-label">ID ნომერი</div>
                            <div class="detail-value">#{{ order.id }}</div>
                        </div>
                        <div class="col-12">
                            <div class="detail-label">დანიშნულების ადგილი</div>
                            <div class="detail-value">{{ order.city }}, {{ order.address }}</div>
                        </div>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
